<!DOCTYPE HTML>
<html>
    <head>
        <title>Contact Form</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <main>
            <form>
                <label for="name">Name:</label><br>
                <input type="text" id="name" name="name"><br>
                <br>
                <label for="email">Email:</label><br>
                <input type="email" id="email" name="email"><br>

                <p>Reason for contact:</p>
                <input type="radio" id="general" name="reason" value="general">
                <label for="general">General inquiry</label>

                <input type="radio" id="collab" name="reason" value="collab">
                <label for="collab">Collaboration</label>
                
                <input type="radio" id="other" name="reason" value="other">
                <label for="other">Other</label><br><br>

                <input type="checkbox" id="updates" name="updates">
                <label for="updates">Send me updates</label><br><br>

                <label for="message">Message:</label><br>
                <textarea id="message" name="message" rows="4" cols="30"></textarea><br><br>
                
                <label for="topic">How did you hear about me?</label>
                <select id="topic" name="topic">
                    <option value="friend">Friend</option>
                    <option value="social">Social Media</option>
                    <option value="other">Other</option>
                </select><br><br>

                <button type="submit">Send</button>
            </form>
        </main><br>

        <footer>
            <a href="index.html">Back to Home</a>
        </footer>
    </body>
</html>
